<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Picks</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(135deg, #fff8f0 0%, #fef3e8 50%, #fdf6ef 100%);
  color: #4a4a4a;
  min-height: 100vh;
}

header {
  text-align: center;
  padding: 3rem 2rem 2rem;
}

h1 {
  font-family: 'Fredoka', sans-serif;
  font-size: 3.5rem;
  font-weight: 600;
  margin: 0 0 0.5rem;
  background: linear-gradient(135deg, #ff6b6b 0%, #ffa726 50%, #ffb74d 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

header p {
  color: #888;
  font-size: 1.2rem;
  margin: 0;
}

.filters {
  text-align: center;
  margin-bottom: 2.5rem;
  padding: 0 1rem;
}

.filters button {
  margin: 6px;
  padding: 0.6rem 1.4rem;
  border: none;
  background: white;
  color: #666;
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  border-radius: 25px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  transition: all 0.25s ease;
}

.filters button:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(255, 107, 107, 0.25);
  color: #ff6b6b;
}

.filters button.active {
  background: linear-gradient(135deg, #ff6b6b 0%, #ffa726 100%);
  color: white;
  box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1.8rem;
  padding: 1rem 3rem 4rem;
  max-width: 1400px;
  margin: 0 auto;
}

.card {
  background: white;
  padding: 1.2rem;
  border-radius: 24px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.card:hover {
  transform: translateY(-10px) scale(1.02);
  box-shadow: 0 20px 40px rgba(255, 107, 107, 0.15);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 16px;
  margin-bottom: 1rem;
}

.card h3 {
  font-family: 'Fredoka', sans-serif;
  font-size: 1.3rem;
  font-weight: 500;
  margin: 0 0 0.3rem;
  color: #333;
}

.card .description {
  font-size: 0.9rem;
  color: #777;
  line-height: 1.5;
  margin: 0 0 0.5rem;
}

.card .category {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #ff6b6b;
  margin-bottom: 0.5rem;
  display: block;
}

.btn {
  display: inline-block;
  margin-top: 0.8rem;
  padding: 0.7rem 1.4rem;
  background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%);
  color: white;
  text-decoration: none;
  font-size: 0.85rem;
  font-weight: 700;
  border-radius: 20px;
  transition: all 0.25s ease;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
}

.hero-section {
  max-width: 900px;
  margin: 0 auto 3rem;
  padding: 0 1rem;
}

.hero-card {
  position: relative;
  border-radius: 28px;
  overflow: hidden;
  background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
  box-shadow: 0 8px 30px rgba(255, 107, 107, 0.2);
}

.hero-card img {
  width: 100%;
  height: 280px;
  object-fit: cover;
}

.hero-content {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 2rem;
  background: linear-gradient(to top, rgba(255,255,255,0.95) 0%, transparent 100%);
}

.hero-label {
  display: inline-block;
  background: #ff6b6b;
  color: white;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 0.3rem 0.8rem;
  border-radius: 20px;
  margin-bottom: 0.5rem;
}

.hero-content h2 {
  font-family: 'Fredoka', sans-serif;
  font-size: 2rem;
  margin: 0 0 0.5rem;
  color: #333;
}

.hero-content p {
  color: #666;
  margin: 0 0 1rem;
  font-size: 1rem;
}

@media (max-width: 600px) {
  h1 { font-size: 2.5rem; }
  .grid { padding: 1rem; gap: 1.2rem; }
  .filters button { padding: 0.5rem 1rem; font-size: 0.8rem; }
  .hero-card img { height: 200px; }
  .hero-content h2 { font-size: 1.5rem; }
}
  .grid { padding: 1rem; }
  .filters button { padding: 0.6rem 1rem; font-size: 0.8rem; }
  .hero-card img { height: 200px; }
  .hero-content h2 { font-size: 1.5rem; }
}

.hero-section {
  max-width: 900px;
  margin: 0 auto 3rem;
  padding: 0 1rem;
}

.hero-card {
  position: relative;
  border-radius: 24px;
  overflow: hidden;
  background: linear-gradient(145deg, #252019 0%, #1a1612 100%);
  border: 1px solid #2d2822;
}

.hero-card img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

.hero-content {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 2rem;
  background: linear-gradient(to top, rgba(26, 22, 18, 0.95) 0%, transparent 100%);
}

.hero-label {
  display: inline-block;
  background: #d4a574;
  color: #1a1612;
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 0.3rem 0.8rem;
  border-radius: 4px;
  margin-bottom: 0.5rem;
}

.hero-content h2 {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  margin: 0 0 0.5rem;
  color: #f5f0eb;
}

.hero-content p {
  color: #a09890;
  margin: 0 0 1rem;
  font-size: 1rem;
}
</style>
</head>

<body>

<header>
  <h1>Smart Picks</h1>
  <p>Useful products you’ll actually use</p>
</header>
<div class="hero-section">
  <div class="hero-card">
    <img src="https://images.unsplash.com/photo-1507473885765-e6ed057f782c?w=800&h=400&fit=crop" alt="Lighting Deals">
    <div class="hero-content">
      <span class="hero-label">Limited Time Deal</span>
      <h2>Lighting Deals</h2>
      <p>Beautiful lighting solutions to brighten up your space.</p>
      <a href="https://amzn.to/4d3HT84" class="btn" target="_blank" rel="noopener">Shop Now</a>
    </div>
  </div>
</div>
<div class="filters">
  <button onclick="filter('all')" class="active">All</button>
  <button onclick="filter('kitchen')">Kitchen</button>
  <button onclick="filter('desk')">Electronics</button>
  <button onclick="filter('home')">Home</button>
  <button onclick="filter('beauty')">Beauty</button>
</div>

<div class="grid" id="products"></div>

<script>
const items = [
  {
    category: "kitchen",
    name: "Coffee Cups & Mugs",
    description: "Premium ceramic mugs and coffee cups for your daily brew.",
    img: "https://images.unsplash.com/photo-1514228742587-6b1558fcca3d?w=400&h=300&fit=crop",
    link: "https://amzn.to/42xsYgd",
  },
  {
    category: "desk",
    name: "Electronics",
    description: "Latest gadgets and accessories to boost your productivity.",
    img: "https://images.unsplash.com/photo-1498049794561-7780e7231661?w=400&h=300&fit=crop",
    link: "https://amzn.to/41ORUjc",
  },
  {
    category: "home",
    name: "Furniture & Mattress",
    description: "Comfortable furniture and quality mattresses for better living.",
    img: "https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=400&h=300&fit=crop",
    link: "https://amzn.to/4u7Dc2W",
  },
  {
    category: "beauty",
    name: "Sunscreens",
    description: "Protect your skin with top-rated sunscreens for all skin types.",
    img: "https://images.unsplash.com/photo-1556228720-195a672e8a03?w=400&h=300&fit=crop",
    link: "https://amzn.to/4sRknQs",
  },
  {
    category: "home",
    name: "Air Conditioners",
    description: "Stay cool with energy-efficient ACs for every room.",
    img: "https://images.unsplash.com/photo-1630699144867-37acec97df5a?w=400&h=300&fit=crop",
    link: "https://amzn.to/4cLrunm",
  },
];

function render(list) {
  const container = document.getElementById("products");
  container.innerHTML = list.map(item => `
    <div class="card">
      <img src="${item.img}">
      <span class="category">${item.category}</span>
      <h3>${item.name}</h3>
      <p class="description">${item.description}</p>
      <a href="${item.link}" class="btn" target="_blank" rel="noopener">View on Amazon</a>
    </div>
  `).join('');
}

function filter(category) {
  document.querySelectorAll('.filters button').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  if (category === 'all') render(items);
  else render(items.filter(i => i.category === category));
}

render(items);
</script>

</body>
</html>
